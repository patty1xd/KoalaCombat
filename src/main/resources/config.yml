# ╔══════════════════════════════╗
# ║     KoalaCombat Config       ║
# ╚══════════════════════════════╝

combat-duration: 15

action-bar: "&c⚔ In Combat: &f{time}s"
tagged-message: "&c⚔ You are now in combat!"
combat-end-message: "&aYou are no longer in combat."
blocked-command-message: "&cYou cannot use &f/{cmd} &cwhile in combat!"
safezone-message: "&cYou cannot enter a safe zone while in combat!"
combatlog-broadcast: "&c{player} &7tried to escape combat and &cdied!"

# Commands that are BLOCKED while in combat (everything else is allowed)
# OPs always bypass this list
blocked-commands:
  - "tpa"
  - "tpahere"
  - "tpaccept"
  - "tpdeny"
  - "spawn"
  - "home"
  - "warp"
  - "team home"
  - "team warp"
  - "teamhome"
  - "teamwarp"
  - "back"
  - "rtp"
  - "randomtp"
  - "wild"
  - "vanish"
  - "v"
  - "gm"
  - "gamemode"
  - "god"
  - "fly"

safezones:
  enabled: true
  regions:
    - "spawn"
    - "safezone"

items:
  elytra:
    enabled: true
    message: "&cYou cannot use an Elytra while in combat!"
  trident:
    enabled: true
    message: "&cYou cannot use a Trident while in combat!"

cooldowns:
  ender-pearl:
    enabled: true
    seconds: 15
    message: "&cEnder Pearl is on cooldown for &f{time}s&c!"
  totem:
    enabled: true
    seconds: 10
    message: "&cTotem is on cooldown for &f{time}s&c!"
  mace:
    enabled: true
    seconds: 8
    message: "&cMace is on cooldown for &f{time}s&c!"
